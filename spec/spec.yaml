-
  id: game.tick
  section: Game
  description: 'Orchestrates one game frame. tick(state, dt_secs) advances the gravity timer by dt_secs. When accumulated time exceeds gravity interval, applies move_down. If move_down fails (piece locks), clears lines, updates score/level, spawns next piece. If spawn fails, transitions to GameOver. Returns a TickResult indicating what happened: Nothing, PieceMoved, PieceLocked{lines_cleared}, GameOver. Only runs when GameState is Playing.'
  tags:
  - core
  - game
  - timing
  status: implemented
  depends_on:
  - game.gravity
  - game.move_down
  - game.lock
  - game.line_clear
  - game.next_piece
  - game.game_over
  - game.score
  - game.level

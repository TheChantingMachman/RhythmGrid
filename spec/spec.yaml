  id: audio.rolling_energy
  section: Audio
  description: 'Track rolling average energy per frequency band over a configurable window. RollingEnergy::new(window_secs: f32, frames_per_sec: f32) creates a tracker. window_secs is the averaging duration (e.g. 5.0 for 5 seconds). frames_per_sec is how often update() will be called (e.g. 60.0 for a 60fps game loop — NOT the audio sample rate). update(&mut self, bands: &[f32; 7]) feeds one frame of band energy. averages(&self) -> [f32; 7] returns the rolling average per band. dominant_bands(&self, count: usize) -> Vec<usize> returns the indices of the N bands with highest rolling average, sorted descending by energy. Used for dynamic audio-visual mapping.'
  tags: [core, audio, analysis]
  status: implemented
  depends_on: [audio.fft]
  fixture_patterns: |
    - RollingEnergy::new(window_secs: f32, frames_per_sec: f32) -> Self
    - window_secs: averaging duration (e.g. 5.0 for 5 seconds)
    - frames_per_sec: how often update() is called (e.g. 60.0 for 60fps game loop, NOT audio sample rate)
    - update(&mut self, bands: &[f32; 7]) — call once per game frame
    - averages(&self) -> [f32; 7] — rolling average per band
    - dominant_bands(&self, count: usize) -> Vec<usize> — top N band indices sorted by average energy descending
    - Internal: circular buffer of window_secs * frames_per_sec frames
    - Empty/new tracker: averages returns [0.0; 7], dominant_bands returns first N indices
    - Test: feed constant [1,0,0,0,0,0,0] for 100 frames — band 0 dominates
    - Test: feed spike then zeros — average decays over window_secs

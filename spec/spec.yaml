  id: render.board_state
  section: Render
  description: 'Produces a flat render-ready snapshot of the board. Function board_state(session: &GameSession) -> BoardRenderState returns all visible cells in one pass. BoardRenderState has fields: occupied: Vec<RenderCell>, active: Vec<RenderCell>, ghost: Vec<RenderCell>. RenderCell { row: i32, col: i32, type_index: u32 }. Occupied cells are grid cells with CellState::Occupied(type_index). Active cells are the 4 cells of the current active piece. Ghost cells are the active piece dropped to the lowest valid row (same type_index). All three lists exclude cells with row < 0 (vanish zone above visible board).'
  tags: [render, state]
  status: implemented
  depends_on: [game.tick, game.collision, grid.dimensions, grid.cell_state]
  fixture_patterns: |
    - board_state(session: &GameSession) -> BoardRenderState
    - BoardRenderState { occupied: Vec<RenderCell>, active: Vec<RenderCell>, ghost: Vec<RenderCell> }
    - RenderCell { row: i32, col: i32, type_index: u32 }
    - Occupied: iterate grid.cells, emit RenderCell for each Occupied(type_index) where row >= 0
    - Active: emit 4 RenderCells from session.active_piece position + offsets, where row >= 0
    - Ghost: drop active piece to lowest valid row, emit 4 RenderCells, where row >= 0
    - type_index: I=0, O=1, T=2, S=3, Z=4, J=5, L=6
    - Empty board with active piece at spawn: occupied=[], active=4, ghost=4
    - Board with locked pieces: occupied=N, active=4, ghost=4

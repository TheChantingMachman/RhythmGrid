  id: music.prev_track
  section: Music
  description: Go to the previous track in the playlist. Decrements current_index, wrapping to the last track when at index 0. Returns the new current track path.
  tags:
  - core
  - music
  - playback
  status: implemented
  depends_on:
  - music.skip
-
  id: game.hold_piece
  section: Game
  description: Player can hold the current piece, swapping it with the previously held piece. If no piece is held, the current piece is stored and the next piece from the bag spawns. Hold can only be used once per piece placement — after holding, can_hold is set to false and resets to true when any piece locks via tick() returning PieceLocked. The held piece is stored as a TetrominoType (not an ActivePiece). When swapped back in, it spawns at the standard spawn position via try_spawn in rotation 0. If try_spawn fails (board full), the hold is rejected and the game state is unchanged. hold() returns bool — true if the hold succeeded, false if rejected.
  tags:
  - core
  - game
  status: implemented
  depends_on:
  - game.next_piece
  - game.state
  - game.tick
  modifies:
  - game.tick
  fixture_patterns: |
    - GameSession fields: held_piece: Option<TetrominoType> (None initially), can_hold: bool (true initially)
    - Hold: session.hold() -> bool (true=success, false=rejected)
    - Reset: can_hold resets to true inside tick() when PieceLocked occurs
    - Held type stored as TetrominoType not ActivePiece — rotation always 0 on swap-in
    - Swap-in uses try_spawn — if board full, hold() returns false, state unchanged
    - Test setup: GameSession::new() starts with held_piece=None, can_hold=true

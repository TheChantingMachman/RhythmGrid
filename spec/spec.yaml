  id: audio.spectral_flux
  section: Audio
  description: 'Compute the spectral flux between consecutive FFT frames — measures how much the spectrum is changing. SpectralFluxDetector holds the previous frame''s band energies. Method detect(&mut self, bands: &[f32; 7]) -> f32 computes the sum of positive differences between current and previous band energies (half-wave rectified). Returns a value >= 0.0. Higher values indicate transients, note attacks, or song section transitions. SpectralFluxDetector::new() initializes with zeroed previous frame. Returns 0.0 on first call.'
  tags: [core, audio, analysis]
  status: implemented
  depends_on: [audio.fft]
  fixture_patterns: |
    - SpectralFluxDetector::new() -> Self (zeroed previous frame)
    - detector.detect(bands: &[f32; 7]) -> f32 (method, not free function)
    - Returns sum of max(0, current[i] - previous[i]) for i in 0..7
    - First call returns 0.0 (no previous frame to diff against)
    - Identical consecutive frames return 0.0 (no change)
    - Sudden spike in one band returns that bands increase
    - Test: feed flat bands then spike one band, verify flux equals the spike delta

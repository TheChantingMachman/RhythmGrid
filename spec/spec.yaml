-
  id: render.next_piece_preview
  section: Render
  description: Renders a preview of the next piece from the bag. Function next_piece_quads(piece_type, preview_x, preview_y, cell_size) returns quads for the 4 cells of the piece in spawn rotation (rotation=0), positioned relative to (preview_x, preview_y). Uses piece_color for coloring.
  tags: [render, draw, ui]
  status: implemented
  depends_on: [render.piece_colors, game.next_piece]
-
  id: input.key_map
  section: Input
  description: 'Maps keyboard inputs to game actions. Default mapping: Left=MoveLeft, Right=MoveRight, Down=SoftDrop, Up=RotateCW, X=RotateCW, Z=RotateCCW, Space=HardDrop, C=Hold, P=TogglePause, Escape=BackToMenu, Enter=StartGame. Function map_key(key: KeyCode) -> Option<GameAction> returns the action for a key press. GameAction enum gains Hold variant: MoveLeft, MoveRight, SoftDrop, HardDrop, RotateCW, RotateCCW, Hold, TogglePause, BackToMenu, StartGame. KeyCode enum gains X and C variants. X and Up both map to RotateCW.'
  tags: [input, controls]
  status: implemented
  depends_on: [game.state, game.hold_piece]
  fixture_patterns: |
    - KeyCode gains variants: X, C (alongside existing Left, Right, Down, Up, Z, Space, P, Escape, Enter, Other)
    - GameAction gains variant: Hold (alongside existing 9 variants)
    - map_key(KeyCode::X) -> Some(GameAction::RotateCW)
    - map_key(KeyCode::C) -> Some(GameAction::Hold)
    - map_key(KeyCode::Up) -> Some(GameAction::RotateCW) (unchanged)
    - map_key(KeyCode::Space) -> Some(GameAction::HardDrop) (X no longer maps to HardDrop)
    - Existing mappings unchanged except X
    - GameAction::Hold derives same traits as other variants (Debug, Clone, Copy, PartialEq, Eq)
-
  id: game.tick
  section: Game
  description: 'Orchestrates one game frame. tick(state, dt_secs) advances the gravity timer by dt_secs. When accumulated time exceeds gravity interval, applies move_down. If move_down fails (piece locks), clears lines, updates score/level, spawns next piece. If spawn fails, transitions to GameOver. Returns a TickResult indicating what happened: Nothing, PieceMoved, PieceLocked{lines_cleared}, GameOver. Only runs when GameState is Playing.'
  tags: [core, game, timing]
  status: implemented
  depends_on: [game.gravity, game.move_down, game.lock, game.line_clear, game.next_piece, game.game_over, game.score, game.level]
-
  id: audio.fft
  section: Audio
  description: 'Compute FFT frequency decomposition of audio samples. Takes a window of PCM samples and returns energy in 7 frequency bands. Boundaries are exclusive on the low end, inclusive on the high end (except sub-bass which includes its low bound). Band 0: sub-bass 20-60Hz, Band 1: bass 61-250Hz, Band 2: low-mids 251-500Hz, Band 3: mids 501-2000Hz, Band 4: upper-mids 2001-4000Hz, Band 5: presence 4001-8000Hz, Band 6: brilliance 8001-20000Hz. FFT bins whose center frequency falls below 20Hz or above 20000Hz are excluded. Each band is a normalized 0.0-1.0 value representing relative energy. Function fft_bands(samples: &[f32], sample_rate: u32) -> [f32; 7] returns an array in frequency order. Empty or all-zero input returns [0.0; 7].'
  tags: [core, audio, analysis]
  status: implemented
  constants:
    band0_high: "60"
    band0_low: "20"
    band1_high: "250"
    band1_low: "61"
    band2_high: "500"
    band2_low: "251"
    band3_high: "2000"
    band3_low: "501"
    band4_high: "4000"
    band4_low: "2001"
    band5_high: "8000"
    band5_low: "4001"
    band6_high: "20000"
    band6_low: "8001"
    band_count: "7"
    freq_max: "20000"
    freq_min: "20"
  depends_on: [audio.amplitude]
  fixture_patterns: |
    - fft_bands(&samples, sample_rate) -> [f32; 7]
    - Index order: [sub_bass, bass, low_mids, mids, upper_mids, presence, brilliance]
    - Each value 0.0-1.0 normalized
    - Empty/zero input: returns [0.0; 7]
    - Boundaries: sub-bass includes 20Hz, all others exclusive on low end (e.g. bass starts at 61Hz not 60Hz)
    - FFT bins outside 20-20000Hz are excluded
    - Test with generate_procedural(120, 1.0, 44100) for deterministic non-zero output
-
  id: game.lock_delay
  section: Game
  description: After a piece can no longer move down, a brief lock delay of 500ms begins before the piece locks. Any successful move or rotation resets the timer. Maximum of 15 resets per piece. If the timer expires or resets are exhausted, the piece locks immediately.
  tags: [core, game, timing]
  status: implemented
  constants:
    delay_ms: "400"
    max_resets: "15"
  depends_on: [game.lock, game.move_down, game.tick]
  modifies: [game.tick]
-
  id: music.prev_track
  section: Music
  description: Go to the previous track in the playlist. Decrements current_index, wrapping to the last track when at index 0. Returns the new current track path.
  tags: [core, music, playback]
  status: implemented
  depends_on: [music.skip]
-
  id: game.hold_piece
  section: Game
  description: Player can hold the current piece, swapping it with the previously held piece. If no piece is held, the current piece is stored and the next piece from the bag spawns. Hold can only be used once per piece placement — after holding, can_hold is set to false and resets to true when any piece locks via tick() returning PieceLocked. The held piece is stored as a TetrominoType (not an ActivePiece). When swapped back in, it spawns at the standard spawn position via try_spawn in rotation 0. If try_spawn fails (board full), the hold is rejected and the game state is unchanged. hold() returns bool — true if the hold succeeded, false if rejected.
  tags: [core, game]
  status: implemented
  depends_on: [game.next_piece, game.state, game.tick]
  modifies: [game.tick]
  fixture_patterns: |
    - GameSession fields: held_piece: Option<TetrominoType> (None initially), can_hold: bool (true initially)
    - Hold: session.hold() -> bool (true=success, false=rejected)
    - Reset: can_hold resets to true inside tick() when PieceLocked occurs
    - Held type stored as TetrominoType not ActivePiece — rotation always 0 on swap-in
    - Swap-in uses try_spawn — if board full, hold() returns false, state unchanged
    - Test setup: GameSession::new() starts with held_piece=None, can_hold=true
-
  id: game.t_spin
  section: Game
  description: 'T-spin detection. After a T-piece locks via rotation (last move before lock was a rotate), check the 4 corner cells of the T-piece''s bounding box. If 3 or more corners are occupied or out of bounds, it is a T-spin. T-spin line clears award bonus points: T-spin zero=100, single=200, double=600, triple=800, all multiplied by current level. Function detect_t_spin(grid: &Grid, piece: &ActivePiece, last_move_was_rotate: bool) -> bool. Non-T pieces always return false.'
  tags: [core, game, scoring]
  status: implemented
  depends_on: [game.lock, game.rotate, game.score, game.collision]
  modifies: [game.score]
-
  id: game.combo
  section: Game
  description: 'Consecutive line clear combo. GameSession tracks combo_count: u32 (starts at 0). When tick() or hard_drop() returns PieceLocked with lines_cleared > 0, increment combo_count and add 50 * combo_count * level to the score. When PieceLocked with lines_cleared == 0, reset combo_count to 0. combo_count persists across pieces until a piece locks without clearing.'
  tags: [core, game, scoring]
  status: implemented
  depends_on: [game.score, game.tick, game.level]
  modifies: [game.tick]
-
  id: game.stats
  section: Game
  description: 'Per-game statistics tracking on GameSession. Fields: pieces_placed: u32, lines_cleared_total: u32, max_combo: u32, time_played_secs: f64. pieces_placed increments each time a piece locks. max_combo tracks the highest combo_count reached. time_played_secs accumulates dt while state is Playing. All fields initialize to 0 in GameSession::new().'
  tags: [core, game]
  status: implemented
  depends_on: [game.tick, game.combo]
  modifies: [game.tick]
-
  id: audio.streaming_decode
  section: Audio
  description: 'Streaming audio decoder that yields PCM chunks incrementally. StreamingDecoder::open(path: &Path) -> Result<StreamingDecoder, AudioError> opens a file and reads the format header. sample_rate() -> u32 and channels() -> u16 return format info available immediately after open. next_chunk() -> Option<Vec<f32>> decodes and returns the next chunk of interleaved PCM samples, or None at end of stream. Chunk size varies by codec packet size (typically 1024-4096 frames). The existing decode_audio function remains unchanged for backward compatibility. StreamingDecoder enables lookahead: the caller can decode ahead of playback and run beat analysis on buffered-but-not-yet-played samples for predictive beat detection.'
  tags: [core, audio, decode]
  status: implemented
  depends_on: [audio.decode]
  fixture_patterns: |
    - StreamingDecoder::open(path: &Path) -> Result<StreamingDecoder, AudioError>
    - sample_rate() -> u32, channels() -> u16 — available immediately after open
    - next_chunk() -> Option<Vec<f32>> — interleaved PCM, None at EOF, new Vec each call
    - Chunk size varies by codec (~1024-4096 frames per call)
    - Supports MP3, WAV, FLAC, OGG (same formats as decode_audio)
    - Error: open nonexistent path returns Err(AudioError::FileNotFound)
    - Error: open unsupported extension returns Err(AudioError::UnsupportedFormat)
    - Test WAV fixture: write a minimal WAV file (44-byte header + raw f32 PCM) to a temp dir. WAV header: RIFF chunk, fmt sub-chunk (PCM format=3 for f32, 1 channel, 44100 Hz), data sub-chunk.
    - Verification: open with StreamingDecoder, collect all next_chunk() results, total sample count should match the written data length
    - Existing decode_audio unchanged (backward compatible)
-
  id: audio.spectral_centroid
  section: Audio
  description: 'Compute the spectral centroid — the weighted mean frequency where energy is concentrated. spectral_centroid(samples: &[f32], sample_rate: u32) -> f32 takes a window of raw PCM samples (same input as fft_bands), computes the FFT internally, and returns the energy-weighted center frequency normalized to 0.0-1.0 where 0.0 means all energy is at 20Hz and 1.0 means all energy is at 20kHz. Computed as sum(frequency_i * magnitude_i) / sum(magnitude_i), then mapped to the 20-20000Hz range. Returns 0.0 for empty or all-zero input.'
  tags: [core, audio, analysis]
  status: implemented
  depends_on: [audio.fft]
  fixture_patterns: |
    - spectral_centroid(samples: &[f32], sample_rate: u32) -> f32
    - Returns 0.0-1.0 normalized (0.0 = all bass, 1.0 = all highs)
    - Empty/zero input returns 0.0
    - Pure low-frequency tone → value near 0.0
    - Pure high-frequency tone → value near 1.0
    - Test with generate_procedural for deterministic input
    - Uses same FFT window internally as fft_bands

-
  id: grid.dimensions
  section: Grid
  description: Grid is 10 columns wide and 20 rows tall. Cells indexed as cells[row][col] with row 0 at top, row 19 at bottom, col 0 at left, col 9 at right. A new Grid initializes all cells to CellState::Empty.
  tags:
  - core
  - grid
  status: implemented
  constants:
    height: "20"
    width: "10"
  fixture_patterns: |
    - Create empty grid: Grid::new() (10 cols x 20 rows, all Empty)
    - Access cells: grid.cells[row][col] — Grid does NOT implement Index
    - Constants: WIDTH=10, HEIGHT=20 (usize)
    - Coords: row 0=top, row 19=bottom, col 0=left, col 9=right
    - Fill a cell: grid.cells[row][col] = CellState::Occupied(type_index)
    - Full row: for col in 0..WIDTH { grid.cells[HEIGHT-1][col] = CellState::Occupied(0); }
-
  id: grid.cell_state
  section: Grid
  description: Each cell is either Empty or Occupied(u32). The u32 value identifies what occupies the cell — interpretation is up to the game layer.
  tags:
  - core
  - grid
  status: implemented
  fixture_patterns: |
    - CellState::Empty — default, no data
    - CellState::Occupied(u32) — u32 is the piece type index (0=I, 1=O, 2=T, 3=S, 4=Z, 5=J, 6=L)
    - Derives: Clone, Copy, PartialEq, Debug
    - Compare: assert_eq!(cell, CellState::Empty) or assert_ne!(cell, CellState::Empty)
-
  id: pieces.tetromino_count
  section: Pieces
  description: 'There are exactly 7 tetromino types: I, O, T, S, Z, J, L'
  tags:
  - core
  - pieces
  status: implemented
  constants:
    count: "7"
-
  id: pieces.tetromino_cells
  section: Pieces
  description: Each tetromino is defined by exactly 4 cells
  tags:
  - core
  - pieces
  status: implemented
  constants:
    cells_per_piece: "4"
  depends_on:
  - pieces.tetromino_count
-
  id: pieces.rotation
  section: Pieces
  description: 'Each tetromino has 4 rotation states (0=spawn, 1=90°CW, 2=180°, 3=270°CW). CW transform: (col,row)->(row,-col). All rotation cell data stored in a static [7][4][4] table. Coordinate convention: positive col=right, positive row=down.'
  tags:
  - core
  - pieces
  - rotation
  status: implemented
  depends_on:
  - pieces.tetromino_cells
-
  id: pieces.srs_kicks
  section: Pieces
  description: SRS wall kick data per Tetris Guideline, converted to y-down coordinates. JLSTZ share one kick table, I-piece has a separate table, O-piece has no kicks (rotation is no-op on collision). 8 transitions (4 CW + 4 CCW), 4 kick offsets each. Offsets are (col_delta, row_delta).
  tags:
  - core
  - pieces
  - rotation
  status: implemented
  constants:
    max_kick_tests: "4"
  depends_on:
  - pieces.rotation
-
  id: pieces.spawn
  section: Pieces
  description: New pieces spawn at top-center of the grid in rotation state 0. Spawn origin is (col=4, row=0). If spawn position collides, try up to 4 rows above (vanish zone) before declaring game over.
  tags:
  - core
  - pieces
  status: implemented
  depends_on:
  - pieces.tetromino_cells
-
  id: game.state
  section: Game
  description: 'Game has states: Menu, Playing, Paused, GameOver. Transitions: Menu->Playing, Playing->Paused->Playing, Playing->GameOver, GameOver->Menu.'
  tags:
  - core
  - game
  - state
  status: implemented
-
  id: game.collision
  section: Game
  description: 'A piece position is valid if all its cells satisfy: column is within grid bounds (0..WIDTH), row is not below grid (row < HEIGHT), and the cell is not occupied. Cells with row < 0 (vanish zone / above grid) are always considered valid — they are above the visible area and cannot collide. Uses cells[row][col] indexing with positive col=right, positive row=down.'
  tags:
  - core
  - game
  - collision
  status: implemented
  depends_on:
  - grid.dimensions
  - grid.cell_state
-
  id: game.move_horizontal
  section: Game
  description: Pieces move left or right by one column. Move is rejected if the resulting position is invalid.
  tags:
  - core
  - game
  - movement
  status: implemented
  depends_on:
  - game.collision
-
  id: game.move_down
  section: Game
  description: Soft drop moves the piece down one row. If the move is invalid, the piece locks in place.
  tags:
  - core
  - game
  - movement
  status: implemented
  depends_on:
  - game.collision
-
  id: game.hard_drop
  section: Game
  description: Hard drop instantly moves the piece to the lowest valid row and locks it.
  tags:
  - core
  - game
  - movement
  status: implemented
  depends_on:
  - game.collision
-
  id: game.rotate
  section: Game
  description: Rotate piece clockwise or counter-clockwise. Tries unshifted rotation first, then SRS wall kicks if it collides.
  tags:
  - core
  - game
  - rotation
  status: implemented
  depends_on:
  - game.collision
-
  id: game.lock
  section: Game
  description: A piece locks into the grid when it cannot move down. Each cell stored as CellState::Occupied(type_index) where type_index is the piece's zero-based index (I=0, O=1, T=2, S=3, Z=4, J=5, L=6). Lock triggers line clearing.
  tags:
  - core
  - game
  status: implemented
  depends_on:
  - game.collision
-
  id: game.line_clear
  section: Game
  description: When a row is fully occupied, it is cleared and all rows above shift down. Multiple rows can clear simultaneously. Returns the number of lines cleared so scoring and level can consume it.
  tags:
  - core
  - game
  - scoring
  status: implemented
  depends_on:
  - game.lock
-
  id: game.level
  section: Game
  description: Level starts at 1 and increases every 10 lines cleared. Level determines gravity speed.
  tags:
  - core
  - game
  - progression
  status: implemented
  constants:
    lines_per_level: "10"
    starting_level: "1"
  depends_on:
  - game.line_clear
-
  id: game.score
  section: Game
  description: 'Score awards points for line clears: 1 line=100, 2=300, 3=500, 4=800, multiplied by current level.'
  tags:
  - core
  - game
  - scoring
  status: implemented
  constants:
    double: "300"
    single: "100"
    tetris: "800"
    triple: "500"
  depends_on:
  - game.line_clear
  - game.level
-
  id: game.gravity
  section: Game
  description: Pieces fall automatically at a timed interval. Interval decreases as level increases.
  tags:
  - core
  - game
  - timing
  status: implemented
  depends_on:
  - game.move_down
  - game.level
-
  id: game.next_piece
  section: Game
  description: The next piece to spawn is visible to the player. Uses a 7-bag randomizer so all 7 types appear before any repeats. Bag is shuffled with a time-based seed (system time at creation) for unique sequences each game.
  tags:
  - core
  - game
  status: implemented
-
  id: game.escalation
  section: Game
  description: '2-stage escalation based on stack height. Normal: baseline effects. Danger: music speeds up, effects intensify.'
  tags:
  - core
  - game
  - escalation
  status: implemented
  constants:
    danger_threshold_row: "4"
-
  id: game.game_over
  section: Game
  description: Game ends when a newly spawned piece immediately collides with occupied cells.
  tags:
  - core
  - game
  - state
  status: implemented
  depends_on:
  - game.collision

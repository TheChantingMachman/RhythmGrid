  id: audio.beat_confidence
  section: Audio
  description: 'Measure rhythmic regularity per frequency band. BeatConfidence::new() creates a tracker. update(&mut self, band_beats: &[bool; 7], timestamp_secs: f64) records beat events per band. confidence(&self) -> [f32; 7] returns 0.0-1.0 per band where 1.0 means beats occur at perfectly regular intervals and 0.0 means random/no beats. Regularity measured by coefficient of variation of inter-beat intervals over a rolling window of the last 16 beats per band. The band with highest confidence is likely carrying the song''s rhythmic pulse.'
  tags: [core, audio, analysis]
  status: implemented
  depends_on: [audio.beat_detect]
  fixture_patterns: |
    - BeatConfidence::new() -> Self
    - update(&mut self, band_beats: &[bool; 7], timestamp_secs: f64)
    - confidence(&self) -> [f32; 7] — 0.0 (random) to 1.0 (perfectly regular)
    - Tracks last 16 inter-beat intervals per band
    - Confidence = (1.0 - coefficient_of_variation).clamp(0.0, 1.0)
    - coefficient_of_variation = std_dev / mean (of inter-beat intervals)
    - Band with no beats or < 2 intervals: returns 0.0
    - Test: feed beats at exactly 0.5s intervals for 16+ beats to band 0 — confidence[0] == 1.0 (CV is 0.0 with identical intervals)
    - Test: feed beats to band 0 only — other bands confidence == 0.0
    - Test: band_beats is [bool; 7] — true means beat occurred this frame, false means no beat
    - update should be called every frame, not just on beats — timestamp advances continuously
